services:
  postgres:
    image: postgres:16
    container_name: rqmd-telemetry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rqmd_telemetry
      POSTGRES_USER: rqmd
      POSTGRES_PASSWORD: rqmd_dev_pw
    ports:
      - "55432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rqmd -d rqmd_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rqmd-telemetry-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_pw
    ports:
      - "19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - ./.minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: rqmd-telemetry-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin_dev_pw &&
      mc mb --ignore-existing local/rqmd-telemetry &&
      echo 'MinIO bucket ready: rqmd-telemetry'
      "

  telemetry-gateway:
    build:
      context: ./infra/telemetry-gateway
    container_name: rqmd-telemetry-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      TELEMETRY_PORT: 8080
      DATABASE_URL: postgresql://rqmd:rqmd_dev_pw@postgres:5432/rqmd_telemetry
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_dev_pw
      MINIO_BUCKET: rqmd-telemetry
      MINIO_REGION: us-east-1
      MINIO_SECURE: "false"
    ports:
      - "18080:8080"

  postgres-admin:
    image: adminer:latest
    container_name: rqmd-telemetry-postgres-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
