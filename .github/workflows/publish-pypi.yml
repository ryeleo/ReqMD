name: publish-pypi

on:
  release:
    types: [published]

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/rqmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Validate release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"].strip()
          if not re.fullmatch(r"v?\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Release tag {tag!r} is not a stable semver tag like v0.1.0 or 0.1.0")

          pyproject = pathlib.Path("pyproject.toml")
          version = tomllib.loads(pyproject.read_text(encoding="utf-8"))["project"]["version"]
          if tag.removeprefix("v") != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match project.version {version!r} in pyproject.toml"
              )
          PY

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
